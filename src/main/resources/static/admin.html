<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Sopra Défense</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff3333; --red2: #cc0000; --dark: #0a0505; --panel: #150a0a;
      --border: #3a1010; --text: #ffb0b0; --dim: #7a4040; --green: #00ff88;
    }
    body { background: var(--dark); color: var(--text); font-family: 'Share Tech Mono', monospace; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,51,51,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,51,51,0.03) 1px, transparent 1px);
      background-size: 40px 40px; animation: g 20s linear infinite; pointer-events: none;
    }
    @keyframes g { to { background-position: 40px 40px; } }

    header {
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(21,10,10,0.95);
    }
    .hlogo { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--red); letter-spacing: 0.3em; }
    .hback { font-size: 0.65rem; color: var(--dim); text-decoration: none; letter-spacing: 0.15em; }
    .hback:hover { color: var(--red); }

    main { max-width: 900px; margin: 3rem auto; padding: 0 1rem; }

    /* LOGIN */
    #login-section { display: block; }
    #dashboard-section { display: none; }

    .section-title {
      font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--red);
      text-shadow: 0 0 20px rgba(255,51,51,0.4); margin-bottom: 0.5rem; letter-spacing: 0.1em;
    }
    .section-sub { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.2em; margin-bottom: 2rem; }

    .panel {
      background: var(--panel); border: 1px solid var(--border); padding: 2rem;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      margin-bottom: 2rem;
    }

    label { display: block; font-size: 0.65rem; color: var(--dim); letter-spacing: 0.2em; margin-bottom: 0.4rem; margin-top: 1.2rem; }
    label:first-child { margin-top: 0; }
    input {
      width: 100%; background: #0d0505; border: 1px solid var(--border);
      color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
      padding: 0.7rem 1rem; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--red); }

    .btn {
      margin-top: 1.5rem; width: 100%; padding: 0.85rem; background: transparent;
      border: 1px solid var(--red); color: var(--red); font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover { background: var(--red); color: #000; }
    .btn-green {
      border-color: var(--green); color: var(--green);
    }
    .btn-green:hover { background: var(--green); color: #000; }

    .msg { margin-top: 1rem; font-size: 0.7rem; padding: 0.6rem 1rem; border-left: 3px solid; }
    .msg-err { border-color: var(--red); color: var(--red); background: rgba(255,51,51,0.07); }
    .msg-ok  { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.07); }

    .badge-admin {
      display: inline-block; font-size: 0.55rem; letter-spacing: 0.25em;
      padding: 0.2rem 0.7rem; border: 1px solid var(--red); color: var(--red); margin-bottom: 1.5rem;
    }

    .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .user-grid { grid-template-columns: 1fr; } }

    select {
      width: 100%; background: #0d0505; border: 1px solid var(--border);
      color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
      padding: 0.7rem 1rem; outline: none;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    th { text-align: left; padding: 0.6rem 1rem; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--dim); border-bottom: 1px solid var(--border); }
    td { padding: 0.7rem 1rem; border-bottom: 1px solid rgba(58,16,16,0.5); }
    tr:hover td { background: rgba(255,51,51,0.04); }
    .role-admin { color: var(--red); }
    .role-user  { color: var(--green); }

    .logout { font-size: 0.65rem; color: var(--dim); background: none; border: none; cursor: pointer; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.1em; }
    .logout:hover { color: var(--red); }
  </style>
</head>
<body>

<header>
  <span class="hlogo">⬡ ADMIN — SOPRA DÉFENSE</span>
  <div>
    <button class="logout" id="logout-btn" style="display:none" onclick="logout()">[ DÉCONNEXION ]</button>
    <a class="hback" href="/">← RETOUR PORTAIL</a>
  </div>
</header>

<main>

  <!-- ═══ LOGIN ═══ -->
  <div id="login-section">
    <div class="section-title">AUTHENTIFICATION ADMINISTRATEUR</div>
    <div class="section-sub">[ ACCÈS RESTREINT — HABILITATION REQUISE ]</div>
    <div class="panel">
      <label>IDENTIFIANT</label>
      <input type="text" id="username" placeholder="sopra_admin" autocomplete="off"/>
      <label>MOT DE PASSE</label>
      <input type="password" id="password" placeholder="••••••••"/>
      <button class="btn" onclick="login()">→ ACCÉDER AU SYSTÈME</button>
      <div id="login-msg"></div>
    </div>
  </div>

  <!-- ═══ DASHBOARD ═══ -->
  <div id="dashboard-section">
    <div class="badge-admin">CONNECTÉ EN TANT QU'ADMINISTRATEUR</div>
    <div class="section-title">GESTION DES UTILISATEURS</div>
    <div class="section-sub">[ CRÉER UN COMPTE — HABILITATIONS SYSTÈME ]</div>

    <!-- Créer un user -->
    <div class="panel">
      <div style="font-size:0.75rem; color:var(--dim); letter-spacing:0.15em; margin-bottom:1.5rem;">▶ CRÉER UN NOUVEL UTILISATEUR</div>
      <div class="user-grid">
        <div>
          <label>IDENTIFIANT</label>
          <input type="text" id="new-username" placeholder="nom_utilisateur" autocomplete="off"/>
        </div>
        <div>
          <label>MOT DE PASSE</label>
          <input type="password" id="new-password" placeholder="••••••••"/>
        </div>
      </div>
      <label>RÔLE</label>
      <select id="new-role">
        <option value="USER">USER — Accès documents classifiés</option>
        <option value="ADMIN">ADMIN — Accès administration</option>
      </select>
      <button class="btn btn-green" onclick="createUser()">+ CRÉER L'UTILISATEUR</button>
      <div id="create-msg"></div>
    </div>

    <!-- Liste des users -->
    <div class="panel">
      <div style="font-size:0.75rem; color:var(--dim); letter-spacing:0.15em; margin-bottom:1.5rem;">▶ UTILISATEURS ENREGISTRÉS</div>
      <table>
        <thead>
          <tr><th>#</th><th>IDENTIFIANT</th><th>RÔLE</th></tr>
        </thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>
  </div>

</main>

<script>
  let token = localStorage.getItem('admin_token') || null;
  if (token) showDashboard();

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const msgEl = document.getElementById('login-msg');
    msgEl.innerHTML = '';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        msgEl.innerHTML = `<div class="msg msg-err">⚠ ${data.token || 'Identifiants invalides'}</div>`;
        return;
      }

      // Vérifie que c'est bien un ADMIN (décode le payload JWT)
      const payload = JSON.parse(atob(data.token.split('.')[1]));
      if (payload.role !== 'ADMIN') {
        msgEl.innerHTML = `<div class="msg msg-err">⚠ Accès refusé — rôle insuffisant</div>`;
        return;
      }

      token = data.token;
      localStorage.setItem('admin_token', token);
      showDashboard();

    } catch (e) {
      msgEl.innerHTML = `<div class="msg msg-err">⚠ Erreur réseau : ${e.message}</div>`;
    }
  }

  function showDashboard() {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('dashboard-section').style.display = 'block';
    document.getElementById('logout-btn').style.display = 'inline';
    loadUsers();
  }

  async function createUser() {
    const username = document.getElementById('new-username').value.trim();
    const password = document.getElementById('new-password').value;
    const role     = document.getElementById('new-role').value;
    const msgEl    = document.getElementById('create-msg');
    msgEl.innerHTML = '';

    if (!username || !password) {
      msgEl.innerHTML = `<div class="msg msg-err">⚠ Identifiant et mot de passe requis</div>`;
      return;
    }

    try {
      const res = await fetch('/api/admin/users', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ username, password, role })
      });
      const data = await res.json();

      if (!res.ok) {
        msgEl.innerHTML = `<div class="msg msg-err">⚠ Erreur : ${JSON.stringify(data)}</div>`;
        return;
      }

      msgEl.innerHTML = `<div class="msg msg-ok">✓ Utilisateur créé : ${data.username} [${data.role}]</div>`;
      document.getElementById('new-username').value = '';
      document.getElementById('new-password').value = '';
      loadUsers();

    } catch (e) {
      msgEl.innerHTML = `<div class="msg msg-err">⚠ Erreur réseau : ${e.message}</div>`;
    }
  }

  async function loadUsers() {
    try {
      const res = await fetch('/api/admin/users', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) return;
      const users = await res.json();
      const tbody = document.getElementById('users-table');
      tbody.innerHTML = users.map((u, i) => `
        <tr>
          <td style="color:var(--dim)">${u.id}</td>
          <td>${u.username}</td>
          <td class="${u.role === 'ADMIN' ? 'role-admin' : 'role-user'}">${u.role}</td>
        </tr>
      `).join('');
    } catch(e) {}
  }

  function logout() {
    localStorage.removeItem('admin_token');
    token = null;
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('dashboard-section').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
