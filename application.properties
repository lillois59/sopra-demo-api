# ===== SERVER =====
server.port=8080

# ===== H2 DATABASE (in-memory) =====
spring.datasource.url=jdbc:h2:mem:defensedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JWT =====
# Cle secrete fixe (min 256 bits / 32 caracteres)
# En production : mettre dans une variable d'environnement
app.jwt.secret=DefenseSecretKey2026TresLongueAuMoins256BitsObligatoire!!
app.jwt.expiration=86400000